<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Voice Studio - Real Human Sound</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .premium-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .bg-mesh {
            background-color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.1) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(124, 58, 237, 0.1) 0, transparent 50%);
        }
    </style>
</head>
<body class="bg-mesh min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="max-w-2xl w-full premium-card rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] p-8 md:p-12">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-slate-900 tracking-tighter">Humanoid <span class="text-indigo-600">Voice</span></h1>
            <p class="text-slate-500 text-sm mt-2 font-medium">Suara AI Natural (Mirip Manusia Asli)</p>
        </header>

        <div class="space-y-6">
            <div class="grid grid-cols-2 gap-3">
                <button onclick="setVoice('id', 'female')" id="btn-id-female" class="voice-opt p-4 rounded-2xl border-2 border-indigo-600 bg-indigo-50 text-indigo-700 font-bold text-xs transition-all">👩 INDO - WANITA</button>
                <button onclick="setVoice('id', 'male')" id="btn-id-male" class="voice-opt p-4 rounded-2xl border-2 border-slate-100 bg-white text-slate-500 font-bold text-xs transition-all">👨 INDO - PRIA</button>
                <button onclick="setVoice('en', 'female')" id="btn-en-female" class="voice-opt p-4 rounded-2xl border-2 border-slate-100 bg-white text-slate-500 font-bold text-xs transition-all">👩 ENGLISH - FEMALE</button>
                <button onclick="setVoice('en', 'male')" id="btn-en-male" class="voice-opt p-4 rounded-2xl border-2 border-slate-100 bg-white text-slate-500 font-bold text-xs transition-all">👨 ENGLISH - MALE</button>
            </div>

            <div class="relative">
                <textarea id="textInput" rows="6" class="w-full p-6 rounded-3xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-indigo-500 text-slate-700 font-medium placeholder:text-slate-300 resize-none" placeholder="Tulis teks yang ingin diubah menjadi suara asli..."></textarea>
            </div>

            <div class="bg-slate-50 p-6 rounded-3xl">
                <div class="flex justify-between items-center mb-4">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Kecepatan Bicara</label>
                    <span id="speedDisplay" class="text-xs font-bold text-indigo-600 bg-white px-3 py-1 rounded-full shadow-sm">Normal</span>
                </div>
                <input type="range" id="speed" min="0.5" max="1.5" value="1" step="0.1" class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
            </div>

            <div class="flex flex-col gap-4 pt-4">
                <button onclick="playNeural()" class="w-full py-5 bg-slate-900 text-white rounded-[1.5rem] font-black text-lg hover:bg-black transition-all shadow-xl active:scale-95">
                    ▶️ PUTAR SUARA
                </button>
                <button onclick="downloadNeural()" class="w-full py-4 bg-green-500 text-white rounded-[1.5rem] font-black text-sm hover:bg-green-600 transition-all flex items-center justify-center gap-2 uppercase tracking-widest">
                    📥 Download Audio (.mp3)
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'id';
        let currentGender = 'female';

        function setVoice(lang, gender) {
            currentLang = lang;
            currentGender = gender;
            
            // Reset UI tombol
            document.querySelectorAll('.voice-opt').forEach(btn => {
                btn.classList.remove('border-indigo-600', 'bg-indigo-50', 'text-indigo-700');
                btn.classList.add('border-slate-100', 'bg-white', 'text-slate-500');
            });
            
            // Aktifkan tombol yang dipilih
            const activeBtn = document.getElementById(`btn-${lang}-${gender}`);
            activeBtn.classList.add('border-indigo-600', 'bg-indigo-50', 'text-indigo-700');
        }

        const speedInput = document.getElementById('speed');
        speedInput.oninput = () => {
            const val = speedInput.value;
            let label = "Normal";
            if(val < 1) label = "Lambat";
            if(val > 1) label = "Cepat";
            document.getElementById('speedDisplay').innerText = label + ` (${val}x)`;
        };

        function getAudioUrl() {
            const text = document.getElementById('textInput').value;
            if(!text) return null;
            
            const speed = speedInput.value;
            // Menggunakan Engine Google TTS yang lebih jernih (Neural-like)
            // tl = target language
            return `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=${currentLang}&total=1&idx=0&textlen=${text.length}&client=tw-ob&ttsspeed=${speed}`;
        }

        function playNeural() {
            const url = getAudioUrl();
            if(!url) return alert("Masukkan teks dulu bosku!");
            
            const audio = new Audio(url);
            audio.play();
        }

        function downloadNeural() {
            const url = getAudioUrl();
            if(!url) return alert("Masukkan teks dulu!");
            
            const link = document.createElement('a');
            link.href = url;
            link.target = '_blank';
            link.download = `suara-ai-${Date.now()}.mp3`;
            link.click();
        }
    </script>
</body>
</html>
